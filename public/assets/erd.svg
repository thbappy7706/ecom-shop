<?xml version="1.0" encoding="UTF-8"?>
<!-- ERD SVG export for Single-Vendor E-Commerce Shop -->
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <style>
    .box { fill:#ffffff; stroke:#333333; stroke-width:2; rx:6; }
    .title { font: bold 16px/1.2 Arial, Helvetica, sans-serif; fill:#111827 }
    .field { font: 13px/1.4 Arial, Helvetica, sans-serif; fill:#374151 }
    .fk { fill:#6b7280; font-style:italic }
    .rel { stroke:#6b7280; stroke-width:2; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Entities -->
  <!-- USERS -->
  <g transform="translate(60,60)" filter="url(#shadow)">
    <rect class="box" width="300" height="140"/>
    <text x="16" y="28" class="title">USERS</text>
    <text x="16" y="54" class="field">id : integer (PK)</text>
    <text x="16" y="74" class="field">name : string</text>
    <text x="16" y="94" class="field">email : string</text>
    <text x="16" y="114" class="field">role : enum</text>
  </g>

  <!-- CATEGORIES -->
  <g transform="translate(420,60)" filter="url(#shadow)">
    <rect class="box" width="260" height="100"/>
    <text x="14" y="26" class="title">CATEGORIES</text>
    <text x="14" y="52" class="field">id : integer (PK)</text>
    <text x="14" y="74" class="field">name : string</text>
  </g>

  <!-- PRODUCTS -->
  <g transform="translate(740,40)" filter="url(#shadow)">
    <rect class="box" width="360" height="160"/>
    <text x="18" y="28" class="title">PRODUCTS</text>
    <text x="18" y="54" class="field">id : integer (PK)</text>
    <text x="18" y="74" class="field">category_id : integer (FK)</text>
    <text x="18" y="94" class="field">name : string</text>
    <text x="18" y="114" class="field">price : decimal</text>
    <text x="18" y="134" class="field">stock : integer</text>
  </g>

  <!-- CARTS -->
  <g transform="translate(60,240)" filter="url(#shadow)">
    <rect class="box" width="300" height="100"/>
    <text x="16" y="28" class="title">CARTS</text>
    <text x="16" y="54" class="field">id : integer (PK)</text>
    <text x="16" y="74" class="field">user_id : integer (FK)</text>
  </g>

  <!-- CART_ITEMS -->
  <g transform="translate(420,240)" filter="url(#shadow)">
    <rect class="box" width="260" height="120"/>
    <text x="14" y="26" class="title">CART_ITEMS</text>
    <text x="14" y="52" class="field">id : integer (PK)</text>
    <text x="14" y="72" class="field">cart_id : integer (FK)</text>
    <text x="14" y="92" class="field">product_id : integer (FK)</text>
    <text x="14" y="112" class="field">quantity : integer</text>
  </g>

  <!-- ORDERS -->
  <g transform="translate(740,240)" filter="url(#shadow)">
    <rect class="box" width="360" height="140"/>
    <text x="18" y="28" class="title">ORDERS</text>
    <text x="18" y="54" class="field">id : integer (PK)</text>
    <text x="18" y="74" class="field">user_id : integer (FK)</text>
    <text x="18" y="94" class="field">status : enum</text>
    <text x="18" y="114" class="field">total_amount : decimal</text>
  </g>

  <!-- ORDER_ITEMS -->
  <g transform="translate(60,380)" filter="url(#shadow)">
    <rect class="box" width="300" height="120"/>
    <text x="16" y="28" class="title">ORDER_ITEMS</text>
    <text x="16" y="54" class="field">id : integer (PK)</text>
    <text x="16" y="74" class="field">order_id : integer (FK)</text>
    <text x="16" y="94" class="field">product_id : integer (FK)</text>
    <text x="16" y="114" class="field">quantity : integer</text>
  </g>

  <!-- PAYMENTS -->
  <g transform="translate(420,420)" filter="url(#shadow)">
    <rect class="box" width="260" height="100"/>
    <text x="14" y="26" class="title">PAYMENTS</text>
    <text x="14" y="52" class="field">id : integer (PK)</text>
    <text x="14" y="72" class="field">order_id : integer (FK)</text>
    <text x="14" y="92" class="field">amount : decimal</text>
  </g>

  <!-- ADDRESSES -->
  <g transform="translate(740,420)" filter="url(#shadow)">
    <rect class="box" width="360" height="100"/>
    <text x="18" y="26" class="title">ADDRESSES</text>
    <text x="18" y="52" class="field">id : integer (PK)</text>
    <text x="18" y="72" class="field">user_id : integer (FK)</text>
    <text x="18" y="92" class="field">address : text</text>
  </g>

  <!-- REVIEWS -->
  <g transform="translate(60,540)" filter="url(#shadow)">
    <rect class="box" width="300" height="120"/>
    <text x="16" y="28" class="title">REVIEWS</text>
    <text x="16" y="54" class="field">id : integer (PK)</text>
    <text x="16" y="74" class="field">user_id : integer (FK)</text>
    <text x="16" y="94" class="field">product_id : integer (FK)</text>
    <text x="16" y="114" class="field">rating : integer</text>
  </g>

  <!-- WISHLISTS -->
  <g transform="translate(420,560)" filter="url(#shadow)">
    <rect class="box" width="260" height="100"/>
    <text x="14" y="26" class="title">WISHLISTS</text>
    <text x="14" y="52" class="field">id : integer (PK)</text>
    <text x="14" y="72" class="field">user_id : integer (FK)</text>
  </g>

  <!-- Relationships (lines) -->
  <!-- Users -> Orders -->
  <line class="rel" x1="210" y1="200" x2="420" y2="260" />
  <!-- Users -> Addresses -->
  <line class="rel" x1="210" y1="120" x2="820" y2="480" />
  <!-- Categories -> Products -->
  <line class="rel" x1="560" y1="110" x2="740" y2="120" />
  <!-- Products -> Order_Items -->
  <line class="rel" x1="880" y1="200" x2="210" y2="420" />
  <!-- Orders -> Order_Items -->
  <line class="rel" x1="900" y1="320" x2="210" y2="440" />
  <!-- Carts -> Cart_Items -->
  <line class="rel" x1="210" y1="300" x2="420" y2="260" />
  <!-- Cart_Items -> Products -->
  <line class="rel" x1="560" y1="300" x2="860" y2="160" />
  <!-- Orders -> Payments -->
  <line class="rel" x1="880" y1="320" x2="560" y2="470" />
  <!-- Users -> Reviews -->
  <line class="rel" x1="210" y1="500" x2="420" y2="560" />
  <!-- Products -> Reviews -->
  <line class="rel" x1="1020" y1="160" x2="210" y2="560" />
  <!-- Users -> Wishlists -->
  <line class="rel" x1="210" y1="140" x2="560" y2="600" />

  <!-- Footer label -->
  <text x="20" y="880" class="field">Diagram: ERD (simplified). Generated SVG export.</text>
</svg>

