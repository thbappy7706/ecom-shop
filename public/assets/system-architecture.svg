<?xml version="1.0" encoding="UTF-8"?>
<!-- System architecture SVG: Laravel + Sail Docker services -->
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <style>
    .svc { fill:#ffffff; stroke:#0f172a; stroke-width:2; rx:8 }
    .title { font: bold 14px/1.2 Arial, Helvetica, sans-serif; fill:#0f172a }
    .small { font: 12px/1.2 Arial, Helvetica, sans-serif; fill:#374151 }
    .line { stroke:#6b7280; stroke-width:2; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Developer / Browser -->
  <g transform="translate(40,40)" filter="url(#shadow)">
    <rect class="svc" width="220" height="80"/>
    <text x="12" y="28" class="title">Developer Machine</text>
    <text x="12" y="48" class="small">Browser, IDE, CLI</text>
  </g>

  <!-- Docker Host -->
  <g transform="translate(300,20)">
    <rect x="0" y="0" width="980" height="820" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="6,4" rx="10"/>
    <text x="14" y="28" class="title">Docker Host / Laravel Sail (compose)</text>

    <!-- App container -->
    <g transform="translate(30,60)" filter="url(#shadow)">
      <rect class="svc" width="320" height="120"/>
      <text x="14" y="28" class="title">laravel.test</text>
      <text x="14" y="52" class="small">PHP-FPM / Nginx, Artisan, Queue Worker</text>
      <text x="14" y="72" class="small">Inertia (React) / Vite</text>
    </g>

    <!-- MySQL -->
    <g transform="translate(400,60)" filter="url(#shadow)">
      <rect class="svc" width="260" height="100"/>
      <text x="12" y="28" class="title">mysql</text>
      <text x="12" y="52" class="small">MySQL 8.4 (data volume)</text>
    </g>

    <!-- Redis -->
    <g transform="translate(30,210)" filter="url(#shadow)">
      <rect class="svc" width="260" height="80"/>
      <text x="12" y="28" class="title">redis</text>
      <text x="12" y="52" class="small">cache / queue</text>
    </g>

    <!-- Meilisearch -->
    <g transform="translate(330,210)" filter="url(#shadow)">
      <rect class="svc" width="260" height="80"/>
      <text x="12" y="28" class="title">meilisearch</text>
      <text x="12" y="52" class="small">search index</text>
    </g>

    <!-- Mailpit -->
    <g transform="translate(640,210)" filter="url(#shadow)">
      <rect class="svc" width="220" height="80"/>
      <text x="12" y="28" class="title">mailpit</text>
      <text x="12" y="52" class="small">local SMTP capture</text>
    </g>

    <!-- Soketi -->
    <g transform="translate(900,210)" filter="url(#shadow)">
      <rect class="svc" width="220" height="80"/>
      <text x="12" y="28" class="title">soketi</text>
      <text x="12" y="52" class="small">Pusher-compatible realtime</text>
    </g>

    <!-- phpMyAdmin -->
    <g transform="translate(680,60)" filter="url(#shadow)">
      <rect class="svc" width="220" height="80"/>
      <text x="12" y="28" class="title">phpmyadmin</text>
      <text x="12" y="52" class="small">DB web UI</text>
    </g>

    <!-- Selenium -->
    <g transform="translate(30,320)" filter="url(#shadow)">
      <rect class="svc" width="220" height="80"/>
      <text x="12" y="28" class="title">selenium</text>
      <text x="12" y="52" class="small">Headless browser for tests</text>
    </g>

    <!-- Volumes / Network note -->
    <g transform="translate(30,430)">
      <rect x="0" y="0" width="1080" height="120" fill="#fff7ed" stroke="#fb923c" rx="6"/>
      <text x="12" y="24" class="small">Volumes: sail-mysql, sail-redis, sail-meilisearch</text>
      <text x="12" y="46" class="small">Network: sail (bridge)</text>
      <text x="12" y="68" class="small">Ports forwarded to host: APP_PORT, VITE_PORT, PHPMYADMIN_PORT, FORWARD_*</text>
    </g>

  </g>

  <!-- Arrows: Developer <-> App and App -> services -->
  <line class="line" x1="260" y1="80" x2="320" y2="120" />
  <line class="line" x1="620" y1="120" x2="520" y2="120" />
  <line class="line" x1="620" y1="160" x2="620" y2="200" />
  <line class="line" x1="620" y1="200" x2="440" y2="240" />
  <line class="line" x1="760" y1="200" x2="760" y2="240" />
  <line class="line" x1="960" y1="200" x2="980" y2="240" />
  <line class="line" x1="720" y1="120" x2="720" y2="160" />

  <!-- Labels for arrows -->
  <text x="300" y="100" class="small">HTTP / Inertia / WebSocket</text>
  <text x="520" y="140" class="small">SQL</text>
  <text x="460" y="260" class="small">Cache / Queue</text>
  <text x="760" y="260" class="small">Search</text>
  <text x="960" y="260" class="small">SMTP</text>

  <text x="20" y="880" class="small">Diagram: Full system architecture (Laravel + Sail services). Generated SVG export.</text>
</svg>

